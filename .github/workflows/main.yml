name: Build Android APK and Send Email

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses and install tools
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          sdkmanager "ndk;27.0.12077973" "cmake;3.22.1"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Send APK via Email
        env:
          EMAIL_PASS: '@15368291z'   # 注意：硬编码密码，用完立即修改
        run: |
          cat > send_email.py << 'EOF'
          import smtplib
          import ssl
          from email.mime.multipart import MIMEMultipart
          from email.mime.base import MIMEBase
          from email.mime.text import MIMEText
          from email import encoders
          from email.utils import formatdate, make_msgid
          import os, glob

          fromaddr = "lzyzstiq@139.com"
          toaddr = "lzyzstiq@139.com"
          password = os.environ["EMAIL_PASS"]

          msg = MIMEMultipart()
          msg["From"] = fromaddr
          msg["To"] = toaddr
          msg["Subject"] = "APK Build from GitHub Actions"
          msg["Date"] = formatdate(localtime=True)
          msg["Message-ID"] = make_msgid(domain="github.com")
          msg["Reply-To"] = fromaddr
          msg["X-Mailer"] = "GitHubActions"

          body = "Your APK file is attached. This is an automated build from GitHub Actions."
          msg.attach(MIMEText(body, "plain"))

          apk_files = glob.glob("app/build/outputs/apk/debug/*.apk")
          if not apk_files:
              raise Exception("No APK found")
          filename = apk_files[0]
          basename = os.path.basename(filename)
          with open(filename, "rb") as attachment:
              part = MIMEBase("application", "vnd.android.package-archive")
              part.set_payload(attachment.read())
              encoders.encode_base64(part)
              part.add_header("Content-Disposition", f"attachment; filename={basename}")
              msg.attach(part)

          context = ssl.create_default_context()
          with smtplib.SMTP_SSL("smtp.139.com", 465, context=context) as server:
              server.login(fromaddr, password)
              server.sendmail(fromaddr, toaddr, msg.as_string())
          print("Email sent successfully")
          EOF
          python send_email.py
